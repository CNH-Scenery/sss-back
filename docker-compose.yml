services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cointwin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cointwin}
      POSTGRES_DB: ${POSTGRES_DB:-cointwin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cointwin -d cointwin"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql+psycopg://cointwin:cointwin@postgres:5432/cointwin}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.scenery.today/v1}
      LLM_MODEL: ${LLM_MODEL:-codex-5.5-extrahigh}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  backend-worker:
    build:
      context: ./backend-worker
    environment:
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql+psycopg://cointwin:cointwin@postgres:5432/cointwin}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.scenery.today/v1}
      LLM_MODEL: ${LLM_MODEL:-codex-5.5-extrahigh}
    command: ["python", "worker.py", "--once"]
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
